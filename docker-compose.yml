services:
  postgres:
    image: postgres:16-alpine
    container_name: jobsearch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-directus}
      POSTGRES_USER: ${POSTGRES_USER:-directus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus-local-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  directus:
    image: directus/directus:11
    container_name: jobsearch-directus
    restart: unless-stopped
    ports:
      - "8055:8055"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY:-replace-with-a-long-random-key}
      SECRET: ${DIRECTUS_SECRET:-replace-with-a-long-random-secret}
      ADMIN_EMAIL: ${DIRECTUS_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_PASSWORD:-change-me-please}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-directus}
      DB_USER: ${POSTGRES_USER:-directus}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-directus-local-password}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "http://localhost:4173,http://127.0.0.1:4173"
      CORS_METHODS: "GET,POST,PATCH,DELETE,OPTIONS"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions

  admin:
    image: nginx:1.27-alpine
    container_name: jobsearch-admin
    restart: unless-stopped
    ports:
      - "4173:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/admin.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - directus

  importer:
    build:
      context: .
      target: app
    container_name: jobsearch-importer
    restart: unless-stopped
    working_dir: /app
    entrypoint: ["node"]
    command: ["scripts/import-server.mjs"]
    ports:
      - "4180:4180"
    depends_on:
      - directus
    environment:
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_EMAIL: ${DIRECTUS_EMAIL:-admin@example.com}
      DIRECTUS_PASSWORD: ${DIRECTUS_PASSWORD:-change-me-please}
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN:-}
      IMPORT_SERVER_PORT: 4180
    volumes:
      - ./:/app:ro

  directus-tools:
    build:
      context: .
      target: app
    profiles:
      - tools
    working_dir: /app
    entrypoint: ["node"]
    command: ["scripts/provision-directus.mjs"]
    depends_on:
      - directus
    environment:
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_EMAIL: ${DIRECTUS_EMAIL:-admin@example.com}
      DIRECTUS_PASSWORD: ${DIRECTUS_PASSWORD:-change-me-please}
      DIRECTUS_TOKEN: ${DIRECTUS_TOKEN:-}
    volumes:
      - ./:/app:ro

volumes:
  postgres_data:
    name: seg-ts-a-linkedin-com-on_postgres_data
    external: true
  directus_uploads:
    name: seg-ts-a-linkedin-com-on_directus_uploads
    external: true
  directus_extensions:
    name: seg-ts-a-linkedin-com-on_directus_extensions
    external: true
