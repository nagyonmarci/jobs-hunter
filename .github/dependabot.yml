version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      ai-sdks:
        patterns: ["@anthropic-ai/*", "@google/genai", "openai"]
      linting:
        dependency-type: development
        patterns:
          [
            "eslint*",
            "@eslint/*",
            "@typescript-eslint/*",
            "eslint-plugin-*",
            "eslint-config-*",
            "globals"
          ]
      testing:
        dependency-type: development
        patterns: ["vitest", "@vitest/*", "fast-check"]
      build-tools:
        dependency-type: development
        patterns: ["typescript", "tsx", "@types/*"]
      git-hooks:
        dependency-type: development
        patterns: ["husky", "lint-staged"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"
    groups:
      all-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
